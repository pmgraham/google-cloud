<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Review UI</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/lucide@0.292.0"></script>
  <script src="https://unpkg.com/lucide-react@0.292.0"></script>
</head>
<body class="bg-zinc-50 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, ReactNode } = React;
    const getIcon = (name) => LucideReact[name] || (() => React.createElement('span', { className: 'w-4 h-4 inline-block bg-zinc-200 rounded-full' }));
    const LayoutTemplate = getIcon('LayoutTemplate');
    const Search = getIcon('Search');
    const Filter = getIcon('Filter');
    const CheckCircle2 = getIcon('CheckCircle') || getIcon('CheckCircle2');
    const AlertCircle = getIcon('AlertCircle');
    const HelpCircle = getIcon('HelpCircle');
    const FileQuestion = getIcon('FileQuestion');
    const Check = getIcon('Check');
    const X = getIcon('X');
    const AlertTriangle = getIcon('TriangleAlert') || getIcon('AlertTriangle');
    const ArrowRightLeft = getIcon('ArrowLeftRight') || getIcon('ArrowRightLeft');
    const Factory = getIcon('Factory');
    const Tag = getIcon('Tag');
    const DollarSign = getIcon('DollarSign');
    const Bot = getIcon('Bot');

    function formatDistanceToNow(dateParam) {
      if (!dateParam) return '';
      const seconds = Math.floor((new Date() - new Date(dateParam)) / 1000);
      if (seconds < 60) return `${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      return `${Math.floor(hours / 24)}d ago`;
    }

    function cn(...classes) {
      return classes.filter(Boolean).join(' ');
    }

    const api = {
      async getDecisions(status, search) {
        const params = new URLSearchParams();
        if (status && status !== 'all') params.append('status', status);
        if (search) params.append('search', search);
        
        const res = await fetch(`/api/decisions?${params.toString()}`);
        if (!res.ok) throw new Error("Failed to fetch");
        return res.json();
      },

      async updateDecision(id, updates) {
        const res = await fetch(`/api/decisions/${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updates),
        });
        if (!res.ok) throw new Error("Failed to update");
        return res.json();
      }
    };

    function DecisionList({ decisions, selectedId, onSelect }) {
      return (
        <div className="divide-y divide-zinc-100">
          {decisions.map((decision) => {
            const isSelected = decision.id === selectedId;
            const isAutoApproved = decision.reasoning?.includes('Auto-approved');
            
            return (
              <button
                key={decision.id}
                onClick={() => onSelect(decision.id)}
                className={cn(
                  "w-full text-left p-4 transition-all hover:bg-zinc-50 focus:outline-none",
                  isSelected ? "bg-indigo-50/50 ring-1 ring-inset ring-indigo-500/20" : ""
                )}
              >
                <div className="flex justify-between items-start mb-1">
                  <div className="flex items-center gap-2">
                    <StatusIcon decision={decision.decision} isMatch={decision.is_match} />
                    <span className="font-mono text-sm font-medium text-zinc-900">
                      {decision.customer_part_number}
                    </span>
                  </div>
                  <span className="text-[10px] text-zinc-400 uppercase tracking-wider font-medium">
                    {decision.created_at ? formatDistanceToNow(decision.created_at) : ''}
                  </span>
                </div>
                
                <div className="pl-6">
                  <p className="text-xs text-zinc-500 truncate mb-2">
                    {decision.customer_description || "Unknown part"}
                  </p>
                  
                  <div className="flex items-center gap-2">
                    <span className={cn(
                      "text-[10px] px-2 py-0.5 rounded-full font-medium border",
                      decision.is_human_reviewed 
                        ? "bg-emerald-50 text-emerald-700 border-emerald-200"
                        : isAutoApproved
                          ? "bg-blue-50 text-blue-700 border-blue-200"
                          : "bg-amber-50 text-amber-700 border-amber-200"
                    )}>
                      {decision.is_human_reviewed ? 'Reviewed' : isAutoApproved ? 'Auto Approved' : 'Pending'}
                    </span>
                    
                    {decision.supplier_part_number && (
                      <span className="text-[10px] text-zinc-400 flex items-center gap-1">
                        → <span className="font-mono">{decision.supplier_part_number}</span>
                      </span>
                    )}
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      );
    }

    function StatusIcon({ decision, isMatch }) {
      if (!decision) return <FileQuestion size={16} className="text-zinc-400" />;
      if (decision === 'MATCH' || decision === 'Human Confirmed' || (decision.includes('High Confidence') && isMatch)) {
        return <CheckCircle2 size={16} className="text-emerald-500" />;
      }
      if (decision.includes('Ambiguous')) {
        return <HelpCircle size={16} className="text-amber-500" />;
      }
      if (!isMatch) {
        return <AlertCircle size={16} className="text-rose-500" />;
      }
      return <FileQuestion size={16} className="text-zinc-400" />;
    }

    function DecisionDetail({ decision, onUpdate }) {
      const isAutoApproved = decision.reasoning?.includes('Auto-approved');
      return (
        <div className="flex flex-col h-full overflow-hidden">
          <div className="bg-white border-b border-zinc-200 p-4 flex items-center justify-between shrink-0">
            <div className="flex items-center gap-3">
              <h2 className="text-lg font-semibold text-zinc-900">Match Review</h2>
              <span className={cn(
                "text-xs px-2.5 py-1 rounded-full font-medium border",
                decision.is_human_reviewed 
                  ? "bg-emerald-50 text-emerald-700 border-emerald-200"
                  : isAutoApproved
                    ? "bg-blue-50 text-blue-700 border-blue-200"
                    : "bg-amber-50 text-amber-700 border-amber-200"
              )}>
                {decision.is_human_reviewed ? 'Reviewed' : isAutoApproved ? 'Auto Approved' : 'Pending Review'}
              </span>
            </div>
            
            <div className="flex items-center gap-2">
              {!decision.is_human_reviewed ? (
                <>
                  <button 
                    onClick={() => onUpdate({ is_human_reviewed: true, is_match: false, decision: 'Human Rejected' })}
                    className="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-lg transition-colors border border-rose-200"
                  >
                    <X size={16} /> Reject Match
                  </button>
                  <button 
                    onClick={() => onUpdate({ is_human_reviewed: true, is_match: true, decision: 'Human Confirmed' })}
                    className="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors shadow-sm"
                  >
                    <Check size={16} /> Confirm Match
                  </button>
                </>
              ) : (
                <button 
                  onClick={() => onUpdate({ is_human_reviewed: false })}
                  className="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-zinc-600 bg-white hover:bg-zinc-50 rounded-lg transition-colors border border-zinc-200 shadow-sm"
                >
                  <AlertTriangle size={16} /> Needs Review
                </button>
              )}
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-6">
            <div className="max-w-4xl mx-auto space-y-6">
              
              <div className="bg-white rounded-xl border border-zinc-200 shadow-sm overflow-hidden">
                <div className="bg-zinc-50/80 border-b border-zinc-200 px-4 py-3 flex items-center gap-2">
                  <Bot size={18} className="text-indigo-600" />
                  <h3 className="font-medium text-sm text-zinc-900">AI Agent Analysis</h3>
                  <span className="ml-auto text-xs font-mono bg-white px-2 py-1 rounded border border-zinc-200 text-zinc-500">
                    {decision.decision}
                  </span>
                </div>
                <div className="p-4">
                  <p className="text-sm text-zinc-700 leading-relaxed">
                    {decision.reasoning}
                  </p>
                </div>
              </div>

              <div className="grid grid-cols-[1fr_auto_1fr] gap-4 items-stretch">
                <div className="bg-white rounded-xl border border-zinc-200 shadow-sm overflow-hidden flex flex-col">
                  <div className="bg-zinc-50/80 border-b border-zinc-200 px-4 py-3">
                    <h3 className="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Customer Part</h3>
                    <div className="font-mono text-lg font-medium text-zinc-900 mt-1">
                      {decision.customer_part_number}
                    </div>
                  </div>
                  <div className="p-4 flex-1 space-y-4">
                    <InfoRow icon={<Tag size={16} />} label="Description" value={decision.customer_description} />
                    <InfoRow icon={<Factory size={16} />} label="Manufacturer" value={decision.customer_manufacturer} />
                    <InfoRow icon={<Tag size={16} />} label="Category" value={decision.customer_category} />
                  </div>
                </div>

                <div className="flex flex-col items-center justify-center text-zinc-300 px-2">
                  <div className="w-px h-full bg-zinc-200"></div>
                  <div className="my-4 bg-white border border-zinc-200 rounded-full p-2 shadow-sm">
                    <ArrowRightLeft size={20} className="text-zinc-400" />
                  </div>
                  <div className="w-px h-full bg-zinc-200"></div>
                </div>

                <div className={cn(
                  "bg-white rounded-xl border shadow-sm overflow-hidden flex flex-col",
                  decision.supplier_part_number ? "border-zinc-200" : "border-dashed border-zinc-300 bg-zinc-50/50"
                )}>
                  <div className="bg-zinc-50/80 border-b border-zinc-200 px-4 py-3">
                    <h3 className="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Matched Supplier Part</h3>
                    <div className="font-mono text-lg font-medium text-zinc-900 mt-1">
                      {decision.supplier_part_number || "No Match Found"}
                    </div>
                  </div>
                  <div className="p-4 flex-1 space-y-4">
                    {decision.supplier_part_number ? (
                      <React.Fragment>
                        <InfoRow icon={<Tag size={16} />} label="Description" value={decision.supplier_description} />
                        <InfoRow icon={<Factory size={16} />} label="Manufacturer" value={decision.supplier_manufacturer} />
                        <InfoRow icon={<Tag size={16} />} label="Category" value={decision.supplier_category} />
                        <InfoRow icon={<DollarSign size={16} />} label="Price" value={decision.supplier_price ? `$${decision.supplier_price.toFixed(2)}` : undefined} />
                      </React.Fragment>
                    ) : (
                      <div className="h-full flex items-center justify-center text-sm text-zinc-400 italic">
                        No supplier part was matched by the agent.
                      </div>
                    )}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    function InfoRow({ icon, label, value }) {
      return (
        <div>
          <div className="flex items-center gap-1.5 text-xs font-medium text-zinc-500 mb-1">
            {icon} {label}
          </div>
          <div className="text-sm text-zinc-900">
            {value || <span className="text-zinc-400 italic">Not specified</span>}
          </div>
        </div>
      );
    }

    function App() {
      const [decisions, setDecisions] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [statusFilter, setStatusFilter] = useState('pending');
      const [searchQuery, setSearchQuery] = useState('');
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        loadDecisions();
      }, [statusFilter, searchQuery]);

      const loadDecisions = async () => {
        setIsLoading(true);
        try {
          const data = await api.getDecisions(statusFilter, searchQuery);
          setDecisions(data);
          if (data.length > 0 && !selectedId) {
            setSelectedId(data[0].id);
          } else if (data.length === 0) {
            setSelectedId(null);
          }
        } catch (error) {
          console.error(error);
        } finally {
          setIsLoading(false);
        }
      };

      const handleUpdate = async (id, updates) => {
        try {
          const updated = await api.updateDecision(id, updates);
          setDecisions(prev => prev.map(d => d.id === id ? { ...d, ...updated } : d));
          
          if (statusFilter === 'pending' && updates.is_human_reviewed) {
            const currentIndex = decisions.findIndex(d => d.id === id);
            if (currentIndex < decisions.length - 1) {
              setSelectedId(decisions[currentIndex + 1].id);
            } else if (currentIndex > 0) {
              setSelectedId(decisions[currentIndex - 1].id);
            } else {
              setSelectedId(null);
            }
            loadDecisions();
          }
        } catch (error) {
          console.error(error);
        }
      };

      const selectedDecision = decisions.find(d => d.id === selectedId) || null;

      return (
        <div className="flex h-screen bg-zinc-50 text-zinc-900 font-sans overflow-hidden">
          <div className="w-1/3 min-w-[350px] max-w-[500px] border-r border-zinc-200 bg-white flex flex-col">
            <div className="p-4 border-b border-zinc-200 bg-zinc-50/50">
              <div className="flex items-center gap-2 mb-4">
                <div className="p-1.5 bg-indigo-100 text-indigo-600 rounded-md">
                  <LayoutTemplate size={20} />
                </div>
                <h1 className="font-semibold text-lg tracking-tight">Match Review</h1>
              </div>
              
              <div className="relative mb-3">
                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400" size={16} />
                <input 
                  type="text" 
                  placeholder="Search parts or descriptions..." 
                  className="w-full pl-9 pr-4 py-2 bg-white border border-zinc-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all"
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                />
              </div>

              <div className="flex items-center gap-2">
                <Filter size={14} className="text-zinc-500" />
                <div className="flex bg-zinc-100 p-1 rounded-lg w-full">
                  {['pending', 'reviewed', 'auto_approved', 'all'].map(status => (
                    <button
                      key={status}
                      onClick={() => setStatusFilter(status)}
                      className={`flex-1 text-xs font-medium py-1.5 px-3 rounded-md capitalize transition-colors ${
                        statusFilter === status 
                          ? 'bg-white text-zinc-900 shadow-sm' 
                          : 'text-zinc-500 hover:text-zinc-700'
                      }`}
                    >
                      {status.replace('_', ' ')}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto">
              {isLoading ? (
                <div className="p-8 text-center text-zinc-500 text-sm">Loading decisions...</div>
              ) : decisions.length === 0 ? (
                <div className="p-8 text-center text-zinc-500 text-sm">No decisions found.</div>
              ) : (
                <DecisionList 
                  decisions={decisions} 
                  selectedId={selectedId} 
                  onSelect={setSelectedId} 
                />
              )}
            </div>
          </div>

          <div className="flex-1 bg-zinc-50 flex flex-col overflow-hidden">
            {selectedDecision ? (
              <DecisionDetail 
                decision={selectedDecision} 
                onUpdate={(updates) => handleUpdate(selectedDecision.id, updates)} 
              />
            ) : (
              <div className="flex-1 flex items-center justify-center text-zinc-400 flex-col gap-4">
                <LayoutTemplate size={48} className="opacity-20" />
                <p>Select a decision to review</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
