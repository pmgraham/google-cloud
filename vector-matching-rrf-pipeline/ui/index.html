<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Review UI</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/lucide@0.292.0"></script>
  <script src="https://unpkg.com/lucide-react@0.292.0"></script>
</head>
<body class="bg-zinc-50 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, ReactNode } = React;
    const getIcon = (name) => LucideReact[name] || (() => React.createElement('span', { className: 'w-4 h-4 inline-block bg-zinc-200 rounded-full' }));
    const LayoutTemplate = getIcon('LayoutTemplate');
    const Search = getIcon('Search');
    const Filter = getIcon('Filter');
    const CheckCircle2 = getIcon('CheckCircle') || getIcon('CheckCircle2');
    const AlertCircle = getIcon('AlertCircle');
    const HelpCircle = getIcon('HelpCircle');
    const FileQuestion = getIcon('FileQuestion');
    const Check = getIcon('Check');
    const X = getIcon('X');
    const AlertTriangle = getIcon('TriangleAlert') || getIcon('AlertTriangle');
    const ArrowRightLeft = getIcon('ArrowLeftRight') || getIcon('ArrowRightLeft');
    const ChevronDown = ({ size = 16, className = "" }) => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round', className }, React.createElement('path', { d: 'm6 9 6 6 6-6' }));
    const ChevronRight = ({ size = 16, className = "" }) => React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round', className }, React.createElement('path', { d: 'm9 18 6-6-6-6' }));
    const Factory = getIcon('Factory');
    const Tag = getIcon('Tag');
    const DollarSign = getIcon('DollarSign');
    const Bot = getIcon('Bot');

    function formatDistanceToNow(dateParam) {
      if (!dateParam) return '';
      const seconds = Math.floor((new Date() - new Date(dateParam)) / 1000);
      if (seconds < 60) return `${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      return `${Math.floor(hours / 24)}d ago`;
    }

    function cn(...classes) {
      return classes.filter(Boolean).join(' ');
    }

    const api = {
      async getDecisions(status, search, page = 1) {
        const params = new URLSearchParams();
        if (status) params.append('status', status);
        if (search) params.append('search', search);
        params.append('page', page);
        
        const res = await fetch(`/api/decisions?${params.toString()}`);
        if (!res.ok) throw new Error("Failed to fetch");
        return res.json();
      },

      async updateDecision(id, updates) {
        const res = await fetch(`/api/decisions/${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updates),
        });
        if (!res.ok) throw new Error("Failed to update");
        return res.json();
      }
    };

    function DecisionList({ decisions, selectedId, selectedCustomerPart, viewMode, onSelect, decisionFilter, onUpdate }) {
      const [collapsedGroups, setCollapsedGroups] = useState({});
      const [defaultCollapsed, setDefaultCollapsed] = useState(false);

      const toggleGroup = (customerPart, e) => {
        if (e) e.stopPropagation();
        setCollapsedGroups(prev => {
          const current = prev.hasOwnProperty(customerPart) ? prev[customerPart] : defaultCollapsed;
          return {
            ...prev,
            [customerPart]: !current
          };
        });
      };

      const groupedDecisions = decisions.reduce((acc, decision) => {
        const key = decision.customer_part_number;
        if (!acc[key]) acc[key] = [];
        acc[key].push(decision);
        return acc;
      }, {});
      
      const groupKeys = Object.keys(groupedDecisions).sort((a, b) => a.localeCompare(b));
      
      const expandAll = () => {
        setDefaultCollapsed(false);
        setCollapsedGroups({});
      };
      const collapseAll = () => {
        setDefaultCollapsed(true);
        setCollapsedGroups({});
      };

      return (
        <div className="flex flex-col h-full">
          {groupKeys.length > 0 && (
            <div className="flex items-center justify-end gap-2 p-2 bg-zinc-50 border-b border-zinc-200 shrink-0">
              <button 
                onClick={expandAll}
                className="text-xs font-medium text-zinc-500 hover:text-indigo-600 transition-colors px-2 py-1 rounded hover:bg-indigo-50"
              >
                Expand All
              </button>
              <button 
                onClick={collapseAll}
                className="text-xs font-medium text-zinc-500 hover:text-indigo-600 transition-colors px-2 py-1 rounded hover:bg-indigo-50"
              >
                Collapse All
              </button>
            </div>
          )}
          <div className="divide-y divide-zinc-200 pb-12 overflow-y-auto">
          {Object.entries(groupedDecisions).map(([customerPart, group]) => {
            const isCollapsed = customerPart in collapsedGroups ? collapsedGroups[customerPart] : defaultCollapsed;
            const filteredGroup = decisionFilter ? group.filter(d => d.decision === decisionFilter) : group;
            
            return (
            <div key={customerPart} className="relative bg-white border-b border-zinc-200 last:border-0">
              <div 
                className={cn(
                  "px-4 py-2 sticky top-0 z-10 border-b flex items-center justify-between cursor-pointer transition-colors",
                  viewMode === 'grouped' && customerPart === selectedCustomerPart
                    ? "bg-indigo-50/90 backdrop-blur-sm border-indigo-200"
                    : "bg-zinc-100/95 backdrop-blur-sm border-zinc-200 hover:bg-zinc-200/50"
                )}
                onClick={(e) => toggleGroup(customerPart, e)}
              >
                <div className="flex items-center gap-1.5">
                  {isCollapsed ? <ChevronRight size={14} className="text-zinc-400" /> : <ChevronDown size={14} className="text-zinc-400" />}
                  <span className="text-xs font-semibold text-zinc-600 uppercase tracking-wider">{customerPart}</span>
                </div>
                <span className="bg-white text-zinc-500 px-2 py-0.5 rounded-full text-[10px] font-medium border border-zinc-200/60 shadow-sm">
                  {filteredGroup.length} {filteredGroup.length === 1 ? 'match' : 'matches'}
                </span>
              </div>
              {!isCollapsed && (
              <div className="divide-y divide-zinc-100">
                {filteredGroup.length === 0 ? (
                  <div className="p-4 text-sm text-zinc-500 italic text-center">
                    No matches found for this filter.
                  </div>
                ) : (
                  filteredGroup.sort((a, b) => {
                    const mfgCompare = (a.supplier_manufacturer || '').localeCompare(b.supplier_manufacturer || '');
                    if (mfgCompare !== 0) return mfgCompare;
                    return (a.supplier_part_number || '').localeCompare(b.supplier_part_number || '');
                  }).map((decision) => {
                  const isSelected = decision.id === selectedId;
                  const isAutoApproved = decision.reasoning?.includes('Auto-approved');
                  
                  return (
                    <button
                      key={decision.id}
                      onClick={() => onSelect(decision.id)}
                      className={cn(
                        "w-full text-left p-4 transition-all hover:bg-zinc-50 focus:outline-none",
                        isSelected ? "bg-indigo-50/50 ring-1 ring-inset ring-indigo-500/20" : ""
                      )}
                    >
                      <div className="flex justify-between items-start mb-1 gap-2">
                        <div className="flex items-center gap-2 min-w-0">
                          <StatusIcon decision={decision.decision} isMatch={decision.is_match} />
                          <span className="font-mono text-sm font-medium text-zinc-900 truncate">
                            {decision.supplier_part_number || "No Match"}
                          </span>
                        </div>
                        <span className="text-[10px] text-zinc-400 uppercase tracking-wider font-medium shrink-0 pt-0.5">
                          {decision.created_at ? formatDistanceToNow(decision.created_at) : ''}
                        </span>
                      </div>
                      
                      <div className="pl-6">
                        <p className="text-xs text-zinc-500 truncate mb-2">
                          {decision.supplier_description || decision.customer_description || "Unknown part"}
                        </p>
                        
                        <div className="flex items-center gap-2">
                          <span className={cn(
                            "text-[10px] px-2 py-0.5 rounded-full font-medium border",
                            decision.is_human_reviewed 
                              ? "bg-emerald-50 text-emerald-700 border-emerald-200"
                              : isAutoApproved
                                ? "bg-blue-50 text-blue-700 border-blue-200"
                                : "bg-amber-50 text-amber-700 border-amber-200"
                          )}>
                            {decision.is_human_reviewed ? 'Reviewed' : isAutoApproved ? 'Auto Approved' : 'Pending'}
                          </span>
                        </div>
                      </div>
                    </button>
                  );
                })
              )}
              </div>
              )}
            </div>
            );
          })}
          </div>
        </div>
      );
    }

    function StatusIcon({ decision, isMatch }) {
      if (!decision) return <FileQuestion size={16} className="text-zinc-400" />;
      if (decision === 'MATCH' || decision === 'Human Confirmed' || (decision.includes('High Confidence') && isMatch)) {
        return <CheckCircle2 size={16} className="text-emerald-500" />;
      }
      if (decision.includes('Ambiguous')) {
        return <HelpCircle size={16} className="text-amber-500" />;
      }
      if (!isMatch) {
        return <AlertCircle size={16} className="text-rose-500" />;
      }
      return <FileQuestion size={16} className="text-zinc-400" />;
    }

    function DecisionDetail({ decision, groupCandidates, viewMode = 'single', onViewModeChange, onUpdate, decisionFilter }) {
      
      // Auto-scroll to selected candidate when viewMode is grouped
      useEffect(() => {
        if (viewMode === 'grouped' && decision?.id) {
          const element = document.getElementById(`candidate-${decision.id}`);
          if (element) {
            // Add a small delay to ensure rendering is complete before scrolling
            setTimeout(() => {
              // Get the scrolling container (the flex-1 overflow-y-auto div)
              const container = element.closest('.overflow-y-auto');
              if (container) {
                // Calculate the offset to align the candidate card perfectly with the top sticky Customer Part card
                // The sticky Element has top-6 (24px) + mt-[40px] (40px) = 64px from top of container
                const containerRect = container.getBoundingClientRect();
                const elementRect = element.getBoundingClientRect();
                const relativeTop = elementRect.top - containerRect.top + container.scrollTop;
                
                // Scroll the container so the candidate card aligns with the top of the sticky customer card
                // We want the element to sit exactly at the sticky point + margin = 64px from container top
                container.scrollTo({
                  top: relativeTop - 64,
                  behavior: 'smooth'
                });
              }
              
              // Add a temporary highlight effect
              element.classList.add('ring-2', 'ring-indigo-500', 'ring-offset-2', 'transition-all', 'duration-500');
              setTimeout(() => {
                element.classList.remove('ring-2', 'ring-indigo-500', 'ring-offset-2');
              }, 1500);
            }, 50);
          }
        }
      }, [decision.id, viewMode]);

      const isAutoApproved = decision.reasoning?.includes('Auto-approved');
      return (
        <div className="flex flex-col h-full overflow-hidden">
          <div className="bg-white border-b border-zinc-200 p-4 flex items-center justify-between shrink-0">
            <div className="flex items-center gap-3">
              <h2 className="text-lg font-semibold text-zinc-900">Match Review</h2>
              <span className={cn(
                "text-xs px-2.5 py-1 rounded-full font-medium border",
                decision.is_human_reviewed 
                  ? "bg-emerald-50 text-emerald-700 border-emerald-200"
                  : isAutoApproved
                    ? "bg-blue-50 text-blue-700 border-blue-200"
                    : "bg-amber-50 text-amber-700 border-amber-200"
              )}>
                {decision.is_human_reviewed ? 'Reviewed' : isAutoApproved ? 'Auto Approved' : 'Pending Review'}
              </span>
            </div>
            
            <div className="flex items-center gap-4">
              <div className="flex bg-zinc-100 p-1 rounded-lg border border-zinc-200/50">
                <button 
                  onClick={() => onViewModeChange('single')}
                  className={`text-xs font-medium py-1 px-3 rounded-md transition-colors ${viewMode === 'single' ? 'bg-white text-zinc-900 shadow-sm' : 'text-zinc-500 hover:text-zinc-700'}`}
                >
                  Single Match
                </button>
                <button 
                  onClick={() => onViewModeChange('grouped')}
                  className={`text-xs font-medium py-1 px-3 rounded-md transition-colors ${viewMode === 'grouped' ? 'bg-white text-zinc-900 shadow-sm' : 'text-zinc-500 hover:text-zinc-700'}`}
                >
                  All Candidates
                </button>
              </div>

              {decision.is_human_reviewed && (
                <button 
                  onClick={() => onUpdate(decision.id, { is_human_reviewed: false })}
                  className="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-zinc-600 bg-white hover:bg-zinc-50 rounded-lg transition-colors border border-zinc-200 shadow-sm"
                >
                  <AlertTriangle size={16} /> Needs Review
                </button>
              )}
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-6">
            {viewMode === 'single' ? (
              <div className="max-w-4xl mx-auto space-y-6">
              
              <div className="bg-white rounded-xl border border-zinc-200 shadow-sm overflow-hidden">
                <div className="bg-zinc-50/80 border-b border-zinc-200 px-4 py-3 flex items-center gap-2">
                  <Bot size={18} className="text-indigo-600" />
                  <h3 className="font-medium text-sm text-zinc-900">AI Agent Analysis</h3>
                  <span className="ml-auto text-xs font-mono bg-white px-2 py-1 rounded border border-zinc-200 text-zinc-500">
                    {decision.decision === 'REQUIRES_HUMAN_REVIEW' ? 'Human Review Required' : decision.decision}
                  </span>
                </div>
                <div className="p-4">
                  <p className="text-sm text-zinc-700 leading-relaxed">
                    {decision.reasoning}
                  </p>
                </div>
              </div>

              <div className="grid grid-cols-[1fr_auto_1fr] gap-4 items-stretch">
                <div className="bg-white rounded-xl border border-zinc-200 shadow-sm overflow-hidden flex flex-col">
                  <div className="bg-zinc-50/80 border-b border-zinc-200 px-4 py-3">
                    <h3 className="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Customer Part</h3>
                    <div className="font-mono text-lg font-medium text-zinc-900 mt-1">
                      {decision.customer_part_number}
                    </div>
                  </div>
                  <div className="p-4 flex-1 space-y-4">
                    <InfoRow icon={<Tag size={16} />} label="Description" value={decision.customer_description} />
                    <InfoRow icon={<Factory size={16} />} label="Manufacturer" value={decision.customer_manufacturer} />
                    <InfoRow icon={<Tag size={16} />} label="Category" value={decision.customer_category} />
                  </div>
                </div>

                <div className="flex flex-col items-center justify-center text-zinc-300 px-2">
                  <div className="w-px h-full bg-zinc-200"></div>
                  <div className="my-4 bg-white border border-zinc-200 rounded-full p-2 shadow-sm">
                    <ArrowRightLeft size={20} className="text-zinc-400" />
                  </div>
                  <div className="w-px h-full bg-zinc-200"></div>
                </div>

                <div className={cn(
                  "bg-white rounded-xl border shadow-sm overflow-hidden flex flex-col",
                  decision.supplier_part_number ? "border-zinc-200" : "border-dashed border-zinc-300 bg-zinc-50/50"
                )}>
                  <div className="bg-zinc-50/80 border-b border-zinc-200 px-4 py-3">
                    <h3 className="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Matched Supplier Part</h3>
                    <div className="font-mono text-lg font-medium text-zinc-900 mt-1">
                      {decision.supplier_part_number || "No Match Found"}
                    </div>
                  </div>
                  <div className="p-4 flex-1 space-y-4">
                    {decision.supplier_part_number ? (
                      <React.Fragment>
                        <InfoRow icon={<Tag size={16} />} label="Description" value={decision.supplier_description} />
                        <InfoRow icon={<Factory size={16} />} label="Manufacturer" value={decision.supplier_manufacturer} />
                        <InfoRow icon={<Tag size={16} />} label="Category" value={decision.supplier_category} />
                        <InfoRow icon={<DollarSign size={16} />} label="Price" value={decision.supplier_price ? `$${decision.supplier_price.toFixed(2)}` : undefined} />
                        
                        {!decision.is_human_reviewed && (
                          <div className="mt-6 pt-4 border-t border-zinc-100 flex items-center justify-end gap-3">
                            <button 
                              onClick={() => onUpdate({ is_human_reviewed: true, is_match: false, decision: 'Human Rejected' })}
                              className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-lg transition-colors border border-rose-200"
                            >
                              <X size={16} /> Reject Match
                            </button>
                            <button 
                              onClick={() => onUpdate({ is_human_reviewed: true, is_match: true, decision: 'Human Confirmed' })}
                              className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors shadow-sm"
                            >
                              <Check size={16} /> Confirm Match
                            </button>
                          </div>
                        )}
                      </React.Fragment>
                    ) : (
                      <div className="h-full flex items-center justify-center text-sm text-zinc-400 italic">
                        No supplier part was matched by the agent.
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
            ) : (
              <div className="max-w-6xl mx-auto flex gap-8 items-start relative pb-12">
                {/* Left Column: Customer Part */}
                <div className="w-1/3 flex flex-col sticky top-6">
                  <div className="bg-white rounded-xl border border-zinc-200 shadow-sm overflow-hidden flex flex-col mt-[40px]">
                    <div className="bg-zinc-50/80 border-b border-zinc-200 px-4 py-3">
                      <h3 className="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Customer Part</h3>
                      <div className="font-mono text-lg font-medium text-zinc-900 mt-1">
                        {decision.customer_part_number}
                      </div>
                    </div>
                    <div className="p-4 flex-1 space-y-4">
                      <InfoRow icon={<Tag size={16} />} label="Description" value={decision.customer_description} />
                      <InfoRow icon={<Factory size={16} />} label="Manufacturer" value={decision.customer_manufacturer} />
                      <InfoRow icon={<Tag size={16} />} label="Category" value={decision.customer_category} />
                    </div>
                  </div>
                </div>

                {/* Right Column: Stacked Candidates */}
                <div className="w-2/3 space-y-6 pb-12">
                  <div className="flex items-center gap-2 mb-6">
                    <h3 className="font-semibold text-lg text-zinc-900">Candidate Matches</h3>
                    <span className="bg-zinc-100 text-zinc-600 px-2.5 py-0.5 rounded-full text-xs font-medium border border-zinc-200">
                      {groupCandidates?.length || 0}
                    </span>
                  </div>
                  
                  {(groupCandidates?.filter(c => !decisionFilter || c.decision === decisionFilter).sort((a, b) => {
                    const mfgCompare = (a.supplier_manufacturer || '').localeCompare(b.supplier_manufacturer || '');
                    if (mfgCompare !== 0) return mfgCompare;
                    return (a.supplier_part_number || '').localeCompare(b.supplier_part_number || '');
                  }) || []).map(candidate => {
                    const candidateAutoApproved = candidate.reasoning?.includes('Auto-approved');
                    // Use a ref-able ID for scrolling
                    return (
                      <div id={`candidate-${candidate.id}`} key={candidate.id} className="bg-white rounded-xl border border-zinc-200 shadow-sm overflow-hidden flex flex-col scroll-mt-24">
                        <div className="bg-zinc-50/80 border-b border-zinc-200 px-4 py-3 flex items-center justify-between">
                          <div>
                            <h3 className="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Matched Supplier Part</h3>
                            <div className="font-mono text-lg font-medium text-zinc-900 mt-1 flex items-center gap-2">
                              {candidate.supplier_part_number || "No Match Found"}
                              {candidate.is_human_reviewed ? (
                                <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 text-[10px] px-2 py-0.5 rounded-full font-medium ml-2">Reviewed</span>
                              ) : candidateAutoApproved && (
                                <span className="bg-blue-50 text-blue-700 border border-blue-200 text-[10px] px-2 py-0.5 rounded-full font-medium ml-2">Auto Approved</span>
                              )}
                            </div>
                          </div>
                          
                          {/* Inline Agent Analysis for Candidate */}
                          <div className="flex items-center gap-2 text-right">
                             <div className="flex flex-col items-end">
                               <div className="flex items-center gap-1.5 mb-1">
                                 <Bot size={14} className="text-indigo-600" />
                                 <span className="text-xs font-medium text-zinc-700">Agent Analysis</span>
                               </div>
                               <span className="text-[10px] font-mono bg-white px-2 py-0.5 rounded border border-zinc-200 text-zinc-500">
                                 {candidate.decision === 'REQUIRES_HUMAN_REVIEW' ? 'Human Review Required' : candidate.decision}
                               </span>
                             </div>
                          </div>
                        </div>
                        <div className="p-4 flex-1 space-y-4">
                          {candidate.supplier_part_number ? (
                            <React.Fragment>
                              <InfoRow icon={<Tag size={16} />} label="Description" value={candidate.supplier_description} />
                              <InfoRow icon={<Factory size={16} />} label="Manufacturer" value={candidate.supplier_manufacturer} />
                              <InfoRow icon={<Tag size={16} />} label="Category" value={candidate.supplier_category} />
                              <InfoRow icon={<DollarSign size={16} />} label="Price" value={candidate.supplier_price ? `$${candidate.supplier_price.toFixed(2)}` : undefined} />
                              
                              <div className="mt-4 pt-4 border-t border-zinc-100">
                                <p className="text-xs text-zinc-500 bg-zinc-50 p-3 rounded-lg border border-zinc-100 italic leading-relaxed">"{candidate.reasoning}"</p>
                              </div>

                              {!candidate.is_human_reviewed && (
                                <div className="mt-6 flex items-center justify-end gap-3">
                                  <button 
                                    onClick={() => onUpdate(candidate.id, { is_human_reviewed: true, is_match: false, decision: 'Human Rejected' })}
                                    className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-lg transition-colors border border-rose-200"
                                  >
                                    <X size={16} /> Reject Match
                                  </button>
                                  <button 
                                    onClick={() => onUpdate(candidate.id, { is_human_reviewed: true, is_match: true, decision: 'Human Confirmed' })}
                                    className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors shadow-sm"
                                  >
                                    <Check size={16} /> Confirm Match
                                  </button>
                                </div>
                              )}
                            </React.Fragment>
                          ) : (
                            <div className="h-full flex items-center justify-center text-sm text-zinc-400 italic py-8">
                              No supplier part was matched by the agent.
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            </div>
        </div>
      );
    }

    function InfoRow({ icon, label, value }) {
      return (
        <div>
          <div className="flex items-center gap-1.5 text-xs font-medium text-zinc-500 mb-1">
            {icon} {label}
          </div>
          <div className="text-sm text-zinc-900">
            {value || <span className="text-zinc-400 italic">Not specified</span>}
          </div>
        </div>
      );
    }

    function App() {
      const [decisions, setDecisions] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [viewMode, setViewMode] = useState('single'); // 'single' | 'grouped'
      const [statusFilter, setStatusFilter] = useState('pending');
      const [decisionFilter, setDecisionFilter] = useState('');
      const [searchQuery, setSearchQuery] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [page, setPage] = useState(1);
      const [hasMore, setHasMore] = useState(true);
      const observer = React.useRef();

      const lastElementRef = React.useCallback(node => {
        if (isLoading) return;
        if (observer.current) observer.current.disconnect();
        observer.current = new IntersectionObserver(entries => {
          if (entries[0].isIntersecting && hasMore) {
            setPage(prevPage => prevPage + 1);
          }
        });
        if (node) observer.current.observe(node);
      }, [isLoading, hasMore]);

      useEffect(() => {
        setDecisions([]);
        setPage(1);
        setHasMore(true);
        loadDecisions(1, statusFilter, searchQuery, true);
      }, [statusFilter, searchQuery]);

      useEffect(() => {
        if (page > 1) {
          loadDecisions(page, statusFilter, searchQuery, false);
        }
      }, [page]);

      const loadDecisions = async (currentPage, currentStatus, currentSearch, isReset) => {
        setIsLoading(true);
        try {
          const data = await api.getDecisions(currentStatus, currentSearch, currentPage);
          
          setDecisions(prev => {
            if (isReset) return data;
            const existingIds = new Set(prev.map(d => d.id));
            const newItems = data.filter(d => !existingIds.has(d.id));
            return [...prev, ...newItems];
          });
          
          setHasMore(data.length === 50);
          
          if (isReset && data.length > 0) {
            setSelectedId(data[0].id);
          } else if (isReset && data.length === 0) {
            setSelectedId(null);
          }
        } catch (error) {
          console.error(error);
        } finally {
          setIsLoading(false);
        }
      };

      const handleUpdate = async (id, updates) => {
        try {
          const updated = await api.updateDecision(id, updates);
          
          if (statusFilter === 'pending' && updates.is_human_reviewed) {
            const currentIndex = decisions.findIndex(d => d.id === id);
            if (currentIndex < decisions.length - 1) {
              setSelectedId(decisions[currentIndex + 1].id);
            } else if (currentIndex > 0) {
              setSelectedId(decisions[currentIndex - 1].id);
            } else {
              setSelectedId(null);
            }
            setDecisions(prev => prev.filter(d => d.id !== id));
          } else {
            setDecisions(prev => prev.map(d => d.id === id ? { ...d, ...updated } : d));
          }
        } catch (error) {
          console.error(error);
        }
      };

      const selectedDecision = decisions.find(d => d.id === selectedId) || null;
      const selectedGroup = selectedDecision 
        ? decisions.filter(d => d.customer_part_number === selectedDecision.customer_part_number)
        : [];

      return (
        <div className="flex h-screen bg-zinc-50 text-zinc-900 font-sans overflow-hidden">
          <div className="w-1/3 min-w-[350px] max-w-[500px] border-r border-zinc-200 bg-white flex flex-col">
            <div className="p-4 border-b border-zinc-200 bg-zinc-50/50">
              <div className="flex items-center gap-2 mb-4">
                <div className="p-1.5 bg-indigo-100 text-indigo-600 rounded-md">
                  <LayoutTemplate size={20} />
                </div>
                <h1 className="font-semibold text-lg tracking-tight">Match Review</h1>
              </div>
              
              <div className="relative mb-3">
                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400" size={16} />
                <input 
                  type="text" 
                  placeholder="Search parts or descriptions..." 
                  className="w-full pl-9 pr-4 py-2 bg-white border border-zinc-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all"
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                />
              </div>

              <div className="flex items-center gap-2">
                <Filter size={14} className="text-zinc-500" />
                <div className="flex bg-zinc-100 p-1 rounded-lg w-full">
                  {['pending', 'reviewed', 'auto_approved', 'all'].map(status => (
                    <button
                      key={status}
                      onClick={() => setStatusFilter(status)}
                      className={`flex-1 text-xs font-medium py-1.5 px-3 rounded-md capitalize transition-colors ${
                        statusFilter === status 
                          ? 'bg-white text-zinc-900 shadow-sm' 
                          : 'text-zinc-500 hover:text-zinc-700'
                      }`}
                    >
                      {status.replace('_', ' ')}
                    </button>
                  ))}
                </div>
              </div>

              {statusFilter === 'pending' && (
                <div className="mt-3 flex items-center gap-2">
                  <div className="w-[14px] flex justify-center">
                    <Filter size={14} className="text-zinc-400" />
                  </div>
                  <select
                    className="w-full text-xs font-medium py-1.5 px-2 bg-white border border-zinc-200 rounded-md text-zinc-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all cursor-pointer"
                    value={decisionFilter}
                    onChange={(e) => setDecisionFilter(e.target.value)}
                  >
                    <option value="">All Pending Decisions</option>
                    <option value="MATCH">AI Match</option>
                    <option value="NO_MATCH">AI No Match</option>
                    <option value="REQUIRES_HUMAN_REVIEW">Review Needed</option>
                  </select>
                </div>
              )}
            </div>

            <div className="flex-1 overflow-y-auto">
              {isLoading && decisions.length === 0 ? (
                <div className="p-8 text-center text-zinc-500 text-sm">Loading decisions...</div>
              ) : decisions.length === 0 ? (
                <div className="p-8 text-center text-zinc-500 text-sm">No decisions found.</div>
              ) : (
                <>
                    <DecisionList 
                      decisions={decisions} 
                      selectedId={selectedId} 
                      selectedCustomerPart={selectedDecision?.customer_part_number}
                      viewMode={viewMode}
                      onSelect={setSelectedId} 
                      decisionFilter={decisionFilter}
                      onUpdate={(id, updates) => handleUpdate(id, updates)}
                    />
                  {hasMore && (
                    <div ref={lastElementRef} className="py-4 text-center text-zinc-400 text-sm">
                      {isLoading ? "Loading more..." : "Scroll for more"}
                    </div>
                  )}
                  {!hasMore && decisions.length > 0 && (
                    <div className="py-8 text-center text-zinc-400 text-sm border-t border-zinc-200">
                      End of records
                    </div>
                  )}
                </>
              )}
            </div>
          </div>

          <div className="flex-1 bg-zinc-50 flex flex-col overflow-hidden">
            {selectedDecision ? (
              <DecisionDetail 
                decision={decisions.find(d => d.id === selectedId) || decisions[0]} 
                groupCandidates={selectedGroup}
                viewMode={viewMode}
                onViewModeChange={setViewMode}
                onUpdate={handleUpdate}
                decisionFilter={statusFilter === 'pending' ? decisionFilter : ''}
              />
            ) : (
              <div className="flex-1 flex items-center justify-center text-zinc-400 flex-col gap-4">
                <LayoutTemplate size={48} className="opacity-20" />
                <p>Select a decision to review</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
