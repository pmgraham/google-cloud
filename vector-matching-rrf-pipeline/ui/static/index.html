<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Decisions Review</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-layer-group logo-icon"></i>
                <h2>SyncMatch</h2>
            </div>
            <ul class="nav-links">
                <li><a href="#"><i class="fas fa-home"></i> Overview</a></li>
                <li class="active"><a href="#"><i class="fas fa-link"></i> Matches</a></li>
                <li><a href="#"><i class="fas fa-database"></i> Data</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="breadcrumbs">
                    <span>Matches</span> > <span class="current">Review Queue</span>
                </div>
                <div class="user-profile">
                    <button class="icon-btn"><i class="far fa-question-circle"></i></button>
                    <button class="icon-btn"><i class="far fa-bell"></i></button>
                    <div class="avatar">AG</div>
                </div>
            </header>

            <div class="review-area" id="review-area">
                <!-- Data List View -->
                <div class="list-container">
                    <div class="list-header">
                        <h2>Pending Match Reviews</h2>
                        <span class="match-count" id="total-groups-count">Loading...</span>
                    </div>
                    
                    <div class="matches-list" id="matches-list">
                        <!-- Loading State -->
                        <div class="loading-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Loading matches...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Review Modal Overlay -->
    <div class="modal-overlay" id="review-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div id="modal-body">
                <!-- Modal content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Template for a Customer Part Group in the List -->
    <template id="customer-group-template">
        <div class="customer-group">
            <div class="group-header" onclick="toggleGroup(this)">
                <div class="group-info">
                    <i class="fas fa-chevron-right expand-icon"></i>
                    <span class="cpn-title highlight">CPN-XXX</span>
                    <span class="group-meta"><span class="match-count-badge">X</span> potential matches</span>
                </div>
            </div>
            <div class="group-body">
                <div class="supplier-matches">
                    <!-- Supplier rows injected here -->
                </div>
            </div>
        </div>
    </template>

    <!-- Template for a Supplier Match Row -->
    <template id="supplier-row-template">
        <div class="supplier-row">
            <div class="supplier-info">
                <span class="spn-title highlight">SPN-YYY</span>
                <span class="reasoning-snippet">AI Reasoning snippet...</span>
            </div>
            <button class="btn btn-review-sm" onclick="openReviewModal(this)">
                Review Match <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </template>

    <!-- Template for the Modal Review Card -->
    <template id="review-card-template">
        <div class="review-header">
            <h1 class="review-title">Review Match: <span class="highlight cpn-title">CPN-XXX</span> vs <span class="highlight spn-title">SPN-YYY</span></h1>
        </div>

        <div class="review-card">
            <div class="card-header">
                <h3>Match Details</h3>
                <span class="status-badge pending">Pending Review</span>
            </div>

            <div class="comparison-grid">
                <!-- Customer Part Box -->
                <div class="part-box customer">
                    <div class="part-type-label">Customer Part Number</div>
                    <div class="part-number cpn-text">CPN-XXXXX</div>
                    <div class="part-details">
                        <div class="detail-row">
                            <span class="detail-label">Status</span>
                            <span class="detail-value">Current</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Source</span>
                            <span class="detail-value">Primary Catalog</span>
                        </div>
                    </div>
                </div>

                <!-- Supplier Part Box -->
                <div class="part-box supplier">
                    <div class="part-type-label">Supplier Part Number</div>
                    <div class="part-number spn-text">SPN-XXXXX</div>
                    <div class="part-details">
                        <div class="detail-row">
                            <span class="detail-label">Status</span>
                            <span class="detail-value">Candidate</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Source</span>
                            <span class="detail-value">External Vendor</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="reasoning-section">
                <div class="reasoning-header">
                    <h4><i class="fas fa-robot"></i> AI Decision Reasoning</h4>
                    <span class="confidence-badge">High Confidence</span>
                </div>
                <div class="reasoning-content">
                    <p class="reasoning-text">AI confident in identifying these parts as identical. Analysis pending...</p>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-reject" onclick="handleDecision(false)">
                    <i class="fas fa-times-circle"></i> Not a Match
                </button>
                <button class="btn btn-accept" onclick="handleDecision(true)">
                    <i class="fas fa-check-circle"></i> True Match
                </button>
            </div>
        </div>
    </template>
    
    <script src="/static/app.js"></script>
</body>
</html>
